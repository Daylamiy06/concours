    <!-- Alpine store correction -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.store('correction', {
                selectedCandidate: "",
                activeTab: 'correction',
                scores: [30, 30, 30],
                totalScore: 90,
                loading: false,
                annuleQuestions: [false, false, false],
                soundScore: "",
                errors: [
                    { fath: Array(3).fill(false), tanbih: Array(6).fill(false), jali: Array(8).fill(false), khafi: Array(8).fill(false) },
                    { fath: Array(3).fill(false), tanbih: Array(6).fill(false), jali: Array(8).fill(false), khafi: Array(8).fill(false) },
                    { fath: Array(3).fill(false), tanbih: Array(6).fill(false), jali: Array(8).fill(false), khafi: Array(8).fill(false) }
                ],
                calculateScores() {
                    let baseTotal = 90;
                    let soundTotal = 0;
                    for (let i = 0; i < 3; i++) {
                        const fathErrors = this.errors[i].fath.filter(c => c).length;
                        const isAnnule = fathErrors === 3;
                        this.annuleQuestions[i] = isAnnule;

                        if (isAnnule) {
                            this.scores[i] = 0;
                            baseTotal -= 30;
                            continue;
                        }

                        const fathPenalty = fathErrors * 3;
                        const tanbihPenalty = this.errors[i].tanbih.filter(c => c).length * 1.5;
                        const jaliPenalty = this.errors[i].jali.filter(c => c).length * 1;
                        const khafiPenalty = this.errors[i].khafi.filter(c => c).length * 0.5;
                        const questionPenalty = fathPenalty + tanbihPenalty + jaliPenalty + khafiPenalty;

                        this.scores[i] = 30 - questionPenalty;
                        baseTotal -= questionPenalty;
                    }
                    soundTotal = this.soundScore === "" ? 0 : parseFloat(this.soundScore);
                    this.totalScore = baseTotal + soundTotal;
                },
                updateAnnuleQuestion(index) {
                    const fathErrors = this.errors[index].fath.filter(c => c).length;
                    this.annuleQuestions[index] = fathErrors === 3;
                },
                resetFields() {
                    this.selectedCandidate = "";
                    document.getElementById("candidatSelect").selectedIndex = 0;
                    this.scores = [30, 30, 30];
                    this.totalScore = 90;
                    this.soundScore = "";
                    this.errors = [
                        { fath: Array(3).fill(false), tanbih: Array(6).fill(false), jali: Array(8).fill(false), khafi: Array(8).fill(false) },
                        { fath: Array(3).fill(false), tanbih: Array(6).fill(false), jali: Array(8).fill(false), khafi: Array(8).fill(false) },
                        { fath: Array(3).fill(false), tanbih: Array(6).fill(false), jali: Array(8).fill(false), khafi: Array(8).fill(false) }
                    ];
                }
            });
        });
    </script>

    <!-- Toast -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.store('toast', {
                show: false,
                message: '',
                type: 'success',
                timeout: null,

                trigger(message, type = 'success') {
                    this.message = message;
                    this.type = type;
                    this.show = true;

                    clearTimeout(this.timeout);
                    this.timeout = setTimeout(() => {
                        this.show = false;
                    }, 4000);
                }
            });
        });

        window.showToast = function (message, type = 'success') {
            Alpine.store('toast').trigger(message, type);
        };
    </script>
</head>

                                <div class="flex flex-wrap justify-center gap-1">
                                    <template x-for="i in 8" :key="i">
                                        <input type="checkbox" x-model="errors[index].khafi[i-1]"
                                            @change="calculateScores()" class="m-1" :disabled="!selectedCandidate">

                    <tr>

                    <tr class="bg-white">

                        <td colspan="3" class="border border-gray-400 p-2 w-48">
                            <select x-model="soundScore" @change="calculateScores()" class="w-full h-10 text-center" :disabled="!selectedCandidate">
                                <option value="" selected>حدد ملاحظة</option>

        <div class="flex justify-center relative mt-4">
            <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 w-1/4" @click="window.validateScores()">تأكيد</button>

    <div x-show="activeTab === 'other'" x-cloak x-data="{ loaded: false }" x-init="$watch('activeTab', async val => {
        if (val === 'other' && !loaded) {
            const res = await fetch('document.html');
            const html = await res.text();
            const container = $refs.container;
            container.innerHTML = html;
            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                newScript.src = oldScript.src;
                newScript.defer = oldScript.defer;
                } else {
                newScript.textContent = oldScript.textContent;
                }
                document.body.appendChild(newScript);
            });
            Alpine.initTree(container);
            loaded = true;
            }
        })">

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
        import { getDatabase, ref, get, set, update, onValue } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBA7alPaDE3YTxABZLTkf6sd2dqjyAMF3g",
            authDomain: "musabaqat-92dbf.firebaseapp.com",
            databaseURL: "https://musabaqat-92dbf-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "musabaqat-92dbf",
            storageBucket: "musabaqat-92dbf.firebasestorage.app",
            messagingSenderId: "871664709981",
            appId: "1:871664709981:web:f3bae49d910885faad78b4",
            measurementId: "G-HP0098P694"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            }
        });
        
        const loggedInUser = localStorage.getItem('loggedInUser');
        const userRole = localStorage.getItem('userRole');
        const userOrgId = localStorage.getItem('userOrgId');
        const orgDataPath = (path) => userOrgId ? `orgData/${userOrgId}/${path}` : `orgData/__missing_org__/${path}`;
        const userRef = ref(db, 'utilisateurs/' + loggedInUser);
        const candidatsRef = ref(db, orgDataPath('candidats'));
        const notesRef = ref(db, orgDataPath('notes'));
        const correctionsRef = ref(db, orgDataPath('corrections'));

        async function startLastSeenUpdate(loggedInUser) {
            const updateLastSeen = () => update(userRef, { lastSeen: Date.now() });
            updateLastSeen();
            setInterval(updateLastSeen, 60 * 1000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!loggedInUser || userRole !== "المحكم" || !userOrgId) {
                alert("ليس لديك صلاحية للوصول إلى هذه الصفحة أو لم يتم ربط حسابك بمنظمة !");
                window.location.href = 'login.html';
                return;
            }
            startLastSeenUpdate(loggedInUser);
        });

        import { signOut } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";        
        window.logout = async function () {            
            await update(userRef, { lastSeen: Date.now() - 6 * 60 * 1000 });
            await signOut(auth);

            localStorage.removeItem('loggedInUser');
            localStorage.removeItem('userRole');
            localStorage.removeItem('userOrgId');
            window.location.href = 'login.html';
        };

        const numerosRef = ref(db, orgDataPath('numeros'));
		let numerosData = {};

		window.injectNumeroDataForCandidate = function (candidatId) {
			const numeroEntry = Object.values(numerosData).find(n => String(n.candidatId) === String(candidatId));

			if (numeroEntry) {
				window.injectedPages = {
					pageQ1: Number(numeroEntry.pageFromQ1 || 1),
					pageQ2: Number(numeroEntry.pageFromQ2 || 1),
					pageQ3: Number(numeroEntry.pageFromQ3 || 1)
				};
				window.injectedSurahs = {
					pageQ1: numeroEntry.sourateFromQ1 || "",
					pageQ2: numeroEntry.sourateFromQ2 || "",
					pageQ3: numeroEntry.sourateFromQ3 || ""
				};
				window.injectedVersets = {
					pageQ1: numeroEntry.versetFromQ1 || "",
					pageQ2: numeroEntry.versetFromQ2 || "",
					pageQ3: numeroEntry.versetFromQ3 || ""
				};
				window.injectedRanges = {
					q1: {
						startSurah: Number(numeroEntry.sourateFromQ1 || 0),
						startAyah: Number(numeroEntry.versetFromQ1 || 0),
						endSurah: Number(numeroEntry.sourateToQ1 || 0),
						endAyah: Number(numeroEntry.versetToQ1 || 0)
					},
					q2: {
						startSurah: Number(numeroEntry.sourateFromQ2 || 0),
						startAyah: Number(numeroEntry.versetFromQ2 || 0),
						endSurah: Number(numeroEntry.sourateToQ2 || 0),
						endAyah: Number(numeroEntry.versetToQ2 || 0)
					},
					q3: {
						startSurah: Number(numeroEntry.sourateFromQ3 || 0),
						startAyah: Number(numeroEntry.versetFromQ3 || 0),
						endSurah: Number(numeroEntry.sourateToQ3 || 0),
						endAyah: Number(numeroEntry.versetToQ3 || 0)
					}
				};
			} else {
				window.injectedPages = { pageQ1: 1, pageQ2: 1, pageQ3: 1 };
				window.injectedSurahs = { pageQ1: "", pageQ2: "", pageQ3: "" };
				window.injectedVersets = { pageQ1: "", pageQ2: "", pageQ3: "" };
				window.injectedRanges = {
					q1: { startSurah: 0, startAyah: 0, endSurah: 0, endAyah: 0 },
					q2: { startSurah: 0, startAyah: 0, endSurah: 0, endAyah: 0 },
					q3: { startSurah: 0, startAyah: 0, endSurah: 0, endAyah: 0 }
				};
			}

			window.dispatchEvent(new CustomEvent('numero-data-updated', {
				detail: {
					pages: window.injectedPages,
					surahs: window.injectedSurahs,
					versets: window.injectedVersets,
					ranges: window.injectedRanges
				}
			}));
		}
		
		onValue(numerosRef, (snapshot) => {
    		numerosData = snapshot.val() || {};
    		chargerCandidats();
		});

		async function chargerCandidats() {
    		const candidatsSnapshot = await get(candidatsRef);
    		const correctionsSnapshot = await get(correctionsRef);
    		const candidatsData = candidatsSnapshot.val() || {};
    		const correctionsData = correctionsSnapshot.val() || {};
    		const selectElement = document.getElementById("candidatSelect");
    		selectElement.innerHTML = '<option value="">حدد مرشحًا</option>';

    		Object.entries(numerosData).forEach(([numeroId, numero]) => {
        		const candidatId = numero.candidatId;
            const juryCorrection = correctionsData?.[candidatId]?.[loggedInUser];

        		if (!juryCorrection && candidatsData[candidatId]) {
            		const candidat = candidatsData[candidatId];
                const option = document.createElement("option");
                option.value = candidatId;
                option.textContent = candidat.nom || candidat.name || `مرشح ${candidatId}`;
                selectElement.appendChild(option);
        		}
    		});

			localStorage.removeItem('selectedCandidate:correction');
			selectElement.value = "";
			Alpine.store('correction').selectedCandidate = "";
			window.injectNumeroDataForCandidate("");
	    	window.allCandidats = candidatsData;
   		  window.allCorrections = correctionsData;
		}

        window.validateScores = async function () {
            const store = Alpine.store("correction");
            const selectedId = document.getElementById("candidatSelect").value;
            const correctionScore = store.totalScore;

            if (!selectedId) {
                showToast("يرجى تحديد المرشح", "error");
                return;
            }

            store.loading = true;
            const candidatRef = ref(db, orgDataPath('candidats/' + selectedId));
            const snapshot = await get(candidatRef);

            if (!snapshot.exists()) {
                showToast("المرشح غير موجود", "error");
                store.loading = false;
                return;
            }

            const correctionRef = ref(db, orgDataPath('corrections/' + selectedId + '/' + loggedInUser));
            const existingCorrection = await get(correctionRef);

            if (existingCorrection.exists()) {
                showToast("لقد قمت بتقييم هذا المرشح من قبل", "error");
                store.loading = false;
                return;
            }

            const data = snapshot.val();
            const annulations = {};
            store.annuleQuestions.forEach((val, i) => {
                annulations[`annulequestion${i + 1}`] = val;
            });

            await set(correctionRef, {
                candidatId: Number(selectedId),
                juryUid: loggedInUser,
                orgId: userOrgId,
                scores: store.scores,
                soundScore: store.soundScore === "" ? 0 : parseFloat(store.soundScore),
                totalScore: correctionScore,
                errors: store.errors,
                ...annulations,
                createdAt: Date.now()
            });

            const candidatCorrectionsSnap = await get(ref(db, orgDataPath('corrections/' + selectedId)));
            const candidatCorrections = candidatCorrectionsSnap.val() || {};
            const correctionValues = Object.values(candidatCorrections)
                .map(correction => Number(correction.totalScore))
                .filter(score => Number.isFinite(score));
            const juryCount = correctionValues.length;
            const sumScore = correctionValues.reduce((sum, score) => sum + score, 0);
            const averageScore = juryCount ? Number((sumScore / juryCount).toFixed(2)) : 0;

            await set(ref(db, orgDataPath('notes/' + selectedId)), {
                id: Number(selectedId),
                nom: data.nom || data.name || "",
                pays: data.pays || "",
                ajza: data.ajza || "",
                matricule: data.matricule || "",
                juryCount,
				status: "completed",
                sumScore: Number(sumScore.toFixed(2)),
                averageScore,
                finalScore: averageScore,
                notetotale: averageScore,
                updatedAt: Date.now()
            });

            showToast("تم تسجيل تقييم المحكم بنجاح !", "success");
            store.resetFields();
            localStorage.removeItem('selectedCandidate:correction');
            await chargerCandidats();
            store.loading = false;
        };
    </script>
    
    <script>
        async function handleCandidateChange(event) {
            const store = Alpine.store("correction");
            const selectedValue = event.target.value;

            store.scores = [30, 30, 30];
            store.totalScore = 90;
            store.soundScore = "";
            store.errors = [
                { fath: Array(3).fill(false), tanbih: Array(6).fill(false), jali: Array(8).fill(false), khafi: Array(8).fill(false) },
                { fath: Array(3).fill(false), tanbih: Array(6).fill(false), jali: Array(8).fill(false), khafi: Array(8).fill(false) },
                { fath: Array(3).fill(false), tanbih: Array(6).fill(false), jali: Array(8).fill(false), khafi: Array(8).fill(false) }
            ];
            store.annuleQuestions = [false, false, false];
            store.selectedCandidate = selectedValue;
            localStorage.setItem('selectedCandidate:correction', selectedValue);
            window.injectNumeroDataForCandidate(selectedValue);
        }

    </script>
</body>
