<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تصحيح المرشح</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <script>
  document.addEventListener('alpine:init', () => {
    Alpine.store('candidat', {
      selectedAjza: "",
      loading: false,
      orgName: "",
      numeros: [],
      candidats: [],
      messageTemporaire: "",
      candidatSelectionne: "",
      showFilters: true,
      get candidatsFiltres() {
        const idsUtilisés = this.numeros.map(n => n.candidatId).filter(Boolean);
        return this.candidats.filter(c => c.ajza == this.selectedAjza && !idsUtilisés.includes(c.id));
      }
    });
  });
  </script>
</head>

<body class="flex justify-center items-center min-h-screen bg-gray-100">
  <div x-data="$store.candidat" class="bg-white p-6 shadow-md rounded-lg w-full max-w-3xl">

    <!-- Header -->
    <div class="mb-4 flex items-center gap-2">
      <h1 x-show="orgName" x-text="orgName" class="text-xl font-bold select-none cursor-pointer" 
          title="انقر مرتين لإظهار أو إخفاء الفلاتر"
          @dblclick="showFilters = !showFilters">
        تصحيح المرشح
      </h1>
      <!--<span x-show="orgName" x-text="orgName" class="text-sm text-gray-600"></span>-->
      <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition mr-auto" x-show="showFilters" x-transition>تسجيل الخروج</button>
    </div>

    <!-- Spinner -->
    <div x-show="loading" class="fixed inset-0 bg-white bg-opacity-90 flex items-center justify-center z-50" x-cloak>
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500"></div>
    </div>

    <!-- Bloc des filtres masquable -->
    <div x-show="showFilters" x-transition>
      <!-- Sélecteur Ajza -->
      <div class="mb-4 flex items-center gap-2">
        <label class="block text-lg font-bold whitespace-nowrap">تصفية الأرقام حسب الجزء :</label>
        <select class="border p-2 rounded w-24" x-model="selectedAjza" @change="candidatSelectionne=''; syncSelection()">
          <template x-for="j in [...new Set(numeros.map(n => n.ajza))].sort((a, b) => b - a)" :key="j">
            <option :value="j" x-text="j"></option>
          </template>
        </select>
      </div>

      <!-- Sélecteur Candidat -->
      <div class="mb-4 flex items-center gap-2">
        <label class="block text-lg font-bold whitespace-nowrap">قائمة المرشحين :</label>
        <select class="border p-2 rounded w-48" x-model="candidatSelectionne" @change="syncSelection()">
          <option value="">حدد مرشحًا</option>
          <template x-for="c in candidatsFiltres" :key="c.id">
            <option :value="c.nom" x-text="c.nom"></option>
          </template>
        </select>
      </div>
    </div>

    <!-- Liste des numéros -->
    <div x-show="!candidatSelectionne" 
         class="text-gray-500 text-center py-8" 
         x-text="messageTemporaire || 'الرجاء اختيار مرشح لعرض الأرقام.'"></div>

    <div x-show="candidatSelectionne" 
         class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4" dir="ltr">
      <template x-for="numero in numeros.filter(n => n.ajza == selectedAjza && !n.candidatId).sort((a, b) => a.numero - b.numero)" :key="numero.id">
        <div @click="attribuerNumero(numero.id)" 
             class="bg-blue-100 border-2 border-gray-500 rounded-lg shadow-md p-4 flex items-center justify-center cursor-pointer hover:bg-blue-200">
          <h2 class="text-4xl font-bold text-black" x-text="numero.numero"></h2>
        </div>
      </template>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t mt-10 py-4 text-center text-sm text-gray-600">
      <p>© <span id="year"></span> مسابقة القرآن - جميع الحقوق محفوظة</p>
      <p class="mt-1">تم التطوير بواسطة Day06 -
        <a href="https://wa.me/261327189552" class="text-blue-500 hover:underline" target="_blank">واتساب</a>
      </p>
    </footer>
  </div>

  <!-- Script Firebase -->
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
  import { getDatabase, ref, get, onValue, update } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-database.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBA7alPaDE3YTxABZLTkf6sd2dqjyAMF3g",
    authDomain: "musabaqat-92dbf.firebaseapp.com",
    databaseURL: "https://musabaqat-92dbf-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "musabaqat-92dbf",
    storageBucket: "musabaqat-92dbf.firebasestorage.app",
    messagingSenderId: "871664709981",
    appId: "1:871664709981:web:f3bae49d910885faad78b4",
    measurementId: "G-HP0098P694"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const store = Alpine.store('candidat');
  onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = 'login.html';
  });

  const loggedInUser = localStorage.getItem('loggedInUser');
  const userRole = localStorage.getItem('userRole');
  const userOrgId = localStorage.getItem('userOrgId');
  const orgDataPath = (path) => userOrgId ? `orgData/${userOrgId}/${path}` : `orgData/__missing_org__/${path}`;
  const userRef = ref(db, 'utilisateurs/' + loggedInUser);
  async function startLastSeenUpdate() {
    const updateLastSeen = () => update(userRef, { lastSeen: Date.now() });
    updateLastSeen();
    setInterval(updateLastSeen, 60 * 1000);
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (!loggedInUser || userRole !== "المرشح" || !userOrgId) {
      alert("ليس لديك صلاحية للوصول إلى هذه الصفحة أو لم يتم ضبط بيانات المسابقة !");
      window.location.href = 'login.html';
      return;
    }
    startLastSeenUpdate();
    loadOrganisationName();
    loadNumeros();
    loadCandidats();
    syncSessionSelectionnee();
  });

  async function loadOrganisationName() {
    try {
      const snapshot = await get(ref(db, 'organisations/' + userOrgId + '/name'));
      store.orgName = snapshot.val() || "";
    } catch (error) {
      store.orgName = "";
    }
  }

  function loadNumeros() {
    store.loading = true;
    onValue(ref(db, orgDataPath('numeros')), (snapshot) => {
      const data = snapshot.val() || {};
      const list = Object.entries(data).map(([id, n]) => ({ id, ...n }));
      store.numeros = list;
      const sortedAjza = [...new Set(list.map(n => n.ajza))].sort((a, b) => b - a);
      if (!store.selectedAjza) {
    	store.selectedAjza = sortedAjza[0] || "";
    	store.candidatSelectionne = "";
    	if (store.syncSelection) store.syncSelection();
  	}
      store.loading = false;
    });
  }

  function loadCandidats() {
    onValue(ref(db, orgDataPath('candidats')), (snapshot) => {
      const data = snapshot.val() || {};
      const list = Object.entries(data).map(([id, c]) => ({ id, ...c }));
      store.candidats = list;
    });
  }

  function syncSessionSelectionnee() {
    const sessionRef = ref(db, orgDataPath('sessionPartagee'));

    // Écoute des changements depuis Firebase
    onValue(sessionRef, (snapshot) => {
      const data = snapshot.val() || {};
      const newAjza = data.ajza || "";
      const newCandidat = data.candidat || "";
      if (newAjza !== store.selectedAjza) store.selectedAjza = newAjza;
      if (newCandidat !== store.candidatSelectionne) store.candidatSelectionne = newCandidat;
    });

    store.syncSelection = () => {
      update(sessionRef, {
        ajza: store.selectedAjza || "",
        candidat: store.candidatSelectionne || ""
      });
    };
  }

  function attribuerNumero(numeroId) {
    const candidatNom = store.candidatSelectionne;
    const candidat = store.candidats.find(c => c.nom === candidatNom);
    const numeroRef = ref(db, orgDataPath('numeros/' + numeroId));
    update(numeroRef, { candidatId: candidat.id });
    store.candidatSelectionne = "";
    store.messageTemporaire = "تم ✅";
    update(ref(db, orgDataPath('sessionPartagee')), { ajza: store.selectedAjza, candidat: "" }); // reset partagé
    setTimeout(() => store.messageTemporaire = "", 4000);
  }

  window.attribuerNumero = attribuerNumero;
  window.logout = async function () {
    await update(userRef, { lastSeen: Date.now() - 6 * 60 * 1000 });
    await signOut(auth);
    localStorage.removeItem('loggedInUser');
    localStorage.removeItem('userRole');
    localStorage.removeItem('userOrgId');
    window.location.href = 'login.html';
  };

  document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
