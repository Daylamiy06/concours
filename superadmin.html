<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-database-compat.js"></script>
    <title>إدارة المنصة</title>
    <style>
        [x-cloak] { display: none !important; }
        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6 !important;
            outline: none;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen" x-data="platformAdmin()" x-init="init()">
    <div x-show="loading" class="fixed inset-0 bg-white bg-opacity-90 flex items-center justify-center z-50" x-cloak>
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500"></div>
    </div>

    <header class="bg-white shadow-md fixed top-0 left-0 w-full z-40">
        <div class="p-4 flex items-center justify-between">
            <h1 class="text-xl font-bold">إدارة المنصة</h1>
            <button @click="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">تسجيل الخروج</button>
        </div>
    </header>

    <main class="pt-32 p-6 max-w-6xl mx-auto">
        <div x-show="toast.show" x-text="toast.message" :class="toast.type === 'error' ? 'bg-red-500' : 'bg-green-500'" class="fixed top-24 left-1/2 -translate-x-1/2 text-white px-4 py-2 rounded shadow-lg z-[70]" x-cloak></div>
        <h1 class="text-2xl font-bold mb-4 text-center">إدارة المنظمات</h1>
        <div class="mb-4 flex flex-col sm:flex-row justify-between gap-4 items-stretch sm:items-center">
            <button @click="openCreateModal()" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded w-full sm:w-auto">إنشاء منظمة جديدة</button>
            <input type="text" x-model="searchQuery" placeholder="بحث باسم المنظمة أو المدينة أو البريد..." class="w-full sm:w-1/2 px-4 py-2 border-2 border-gray-500 rounded-md bg-white text-right placeholder:text-right">
        </div>

        <div class="overflow-x-auto bg-white rounded-lg shadow">
            <table class="w-full border-collapse border border-gray-400 text-center">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border border-gray-400 p-2">العمليات</th>
                        <th class="border border-gray-400 p-2">الحالة</th>
                        <th class="border border-gray-400 p-2">البريد الإلكتروني</th>
                        <th class="border border-gray-400 p-2">المدينة / البلد</th>
                        <th class="border border-gray-400 p-2">اسم المنظمة</th>
                        <th class="border border-gray-400 p-2">تاريخ الإنشاء</th>
                    </tr>
                </thead>
                <tbody>
                    <tr x-show="filteredOrganisations.length === 0">
                        <td colspan="6" class="p-4 text-gray-500">لا توجد منظمات لعرضها حالياً.</td>
                    </tr>
                    <template x-for="org in filteredOrganisations" :key="org.id">
                        <tr>
                            <td class="border border-gray-400 p-2">
                                <div class="flex flex-wrap justify-center gap-2">
                                    <button @click="openEditModal(org)" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-2 rounded">تعديل</button>
                                    <button @click="toggleOrganisation(org)" class="text-white font-bold py-1 px-2 rounded" :class="org.active === false ? 'bg-green-500 hover:bg-green-700' : 'bg-yellow-500 hover:bg-yellow-600'" x-text="org.active === false ? 'تفعيل' : 'تعطيل'"></button>
                                    <button @click="askDeleteOrganisation(org)" class="bg-red-500 hover:bg-red-700 text-white font-bold py-1 px-2 rounded">حذف</button>
                                </div>
                            </td>
                            <td class="border border-gray-400 p-2">
                                <span class="inline-block rounded px-2 py-1 text-xs font-bold" :class="org.active === false ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'" x-text="org.active === false ? 'متوقفة' : 'نشطة'"></span>
                            </td>
                            <td class="border border-gray-400 p-2" x-text="org.adminEmail || '-'"></td>
                            <td class="border border-gray-400 p-2" x-text="org.location || '-'"></td>
                            <td class="border border-gray-400 p-2 font-semibold" x-text="org.name"></td>
                            <td class="border border-gray-400 p-2" x-text="formatDate(org.createdAt)"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div x-show="showModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" @click="closeModal()" x-cloak>
            <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-2xl" @click.stop>
                <h2 class="text-2xl font-semibold text-center text-gray-700 mb-4" x-text="isEditMode ? 'تعديل المنظمة' : 'إنشاء منظمة جديدة'"></h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">اسم المنظمة</label>
                        <input x-model="orgForm.name" type="text" class="w-full px-4 py-2 border-2 border-gray-500 rounded-md bg-white text-right" placeholder="مثال: مسابقة الريان">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">المدينة / البلد</label>
                        <input x-model="orgForm.location" type="text" class="w-full px-4 py-2 border-2 border-gray-500 rounded-md bg-white text-right" placeholder="مثال: الدوحة / قطر">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">البريد الإلكتروني للمنظم</label>
                        <input x-model="orgForm.email" type="email" class="w-full px-4 py-2 border-2 border-gray-500 rounded-md bg-white text-right" placeholder="organizer@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
                        <div class="relative">
                			<input x-model="orgForm.password" type="password" id="password" class="w-full px-4 py-2 border-2 border-gray-500 rounded-md bg-white text-right" :placeholder="isEditMode ? 'اتركه فارغًا إذا لم يتغير' : '6 أحرف على الأقل'">
                			<button id="togglePassword" class="absolute inset-y-0 left-0 flex items-center px-3 focus:outline-none">
                    			<svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        			<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.5C7.305 4.5 3.195 7.605 1.89 12c1.305 4.395 5.415 7.5 10.11 7.5s8.805-3.105 10.11-7.5C20.805 7.605 16.695 4.5 12 4.5zM12 15a3 3 0 110-6 3 3 0 010 6z"/>
                    			</svg>
                			</button>
            			</div>
                    </div>
                    <p x-show="isEditMode" class="md:col-span-2 text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded p-2">لتغيير بريد المنظم أو كلمة مروره سيتم إنشاء حساب منظم جديد وربطه بهذه المنظمة.</p>
                </div>
                <div class="flex gap-3 mt-6">
                    <button @click="saveOrganisation()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-md" x-text="isEditMode ? 'حفظ التعديلات' : 'إنشاء المنظمة'"></button>
                    <button @click="closeModal()" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white py-2 rounded-md">إلغاء</button>
                </div>
            </div>
        </div>

        <div x-show="confirmDelete.visible" class="fixed inset-0 bg-black bg-opacity-50 shadow-2xl shadow-black/40 flex items-center justify-center z-50" x-cloak>
            <div class="bg-white px-8 py-6 rounded shadow-lg text-center w-96">
                <h2 class="text-xl font-bold mb-4">حذف</h2>
                <p class="mb-6">هل أنت متأكد من حذف هذه المنظمة وبياناتها؟</p>
                <div class="flex justify-center gap-4">
                    <button @click="confirmDelete.confirm()" class="bg-blue-500 text-white px-5 font-bold py-1 rounded">نعم</button>
                    <button @click="confirmDelete.visible = false" class="bg-red-500 text-white px-5 font-bold py-1 rounded">إلغاء</button>
                </div>
            </div>
        </div>
    </main>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyBA7alPaDE3YTxABZLTkf6sd2dqjyAMF3g",
    authDomain: "musabaqat-92dbf.firebaseapp.com",
    databaseURL: "https://musabaqat-92dbf-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "musabaqat-92dbf",
    storageBucket: "musabaqat-92dbf.firebasestorage.app",
    messagingSenderId: "871664709981",
    appId: "1:871664709981:web:f3bae49d910885faad78b4",
    measurementId: "G-HP0098P694"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function platformAdmin() {
    return {
        loading: true,
        currentUid: localStorage.getItem('loggedInUser') || '',
        organisations: [],
        searchQuery: '',
        showModal: false,
        isEditMode: false,
        selectedOrgId: null,

        orgForm: {
            name: '',
            location: '',
            email: '',
            password: ''
        },

        confirmDelete: {
            visible: false,
            org: null,
            confirm: null
        },

        toast: {
            show: false,
            message: '',
            type: 'success'
        },

        get filteredOrganisations() {
            const query = this.searchQuery.trim().toLowerCase();
            if (!query) return this.organisations;
            return this.organisations.filter(org => [org.name, org.location, org.adminEmail]
                .some(value => String(value || '').toLowerCase().includes(query)));
        },

        init() {
            auth.onAuthStateChanged(async (user) => {
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                this.currentUid = user.uid;
                const userSnap = await db.ref('utilisateurs/' + user.uid).once('value');
                const userData = userSnap.val() || {};
                if (userData.role !== 'super_admin' && userData.platformRole !== 'super_admin') {
                    this.showToast('ليس لديك صلاحية لإدارة المنصة', 'error');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1200);
                    return;
                }

                localStorage.setItem('loggedInUser', user.uid);
                localStorage.setItem('userRole', userData.role || 'super_admin');
                localStorage.setItem('platformRole', userData.platformRole || 'super_admin');
                await db.ref('utilisateurs/' + user.uid).update({lastSeen: Date.now()});
                this.listenOrganisations();
                this.loading = false;
            });
        },

        listenOrganisations() {
            db.ref('organisations').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                this.organisations = Object.entries(data).map(([id, org]) => ({id, ...org})).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            });
        },

        async logout() {
            await auth.signOut();
            localStorage.removeItem('loggedInUser');
            localStorage.removeItem('userRole');
            localStorage.removeItem('platformRole');
            window.location.href = 'login.html';
        },

        resetForm() {
            this.orgForm = {name: '', location: '', email: '', password: ''};
            this.selectedOrgId = null;
            this.isEditMode = false;
        },

        openCreateModal() {
            this.resetForm();
            this.showModal = true;
        },

        openEditModal(org) {
            this.isEditMode = true;
            this.selectedOrgId = org.id;
            this.orgForm = {
                name: org.name || '',
                location: org.location || '',
                email: org.adminEmail || '',
                password: ''
            };
            this.showModal = true;
        },

        closeModal() {
            this.showModal = false;
            this.resetForm();
        },

        async saveOrganisation() {
            if (this.isEditMode) {
                await this.updateOrganisation();
            } else {
                await this.createOrganisation();
            }
        },

        async createOrganisation() {
            if (!this.orgForm.name.trim() || !this.orgForm.email.trim() || !this.orgForm.password.trim()) {
                this.showToast('يرجى إدخال اسم المنظمة والبريد الإلكتروني وكلمة المرور', 'error');
                return;
            }

            if (this.orgForm.password.length < 6) {
                this.showToast('كلمة المرور يجب أن تتكون من 6 أحرف على الأقل', 'error');
                return;
            }

            let secondaryApp = null;
            try {
                this.loading = true;
                secondaryApp = firebase.apps.find(app => app.name === 'Secondary') || firebase.initializeApp(firebaseConfig, 'Secondary');
                const secondaryAuth = secondaryApp.auth();
                const credential = await secondaryAuth.createUserWithEmailAndPassword(
                    this.orgForm.email.trim(),
                    this.orgForm.password
                );

                const uid = credential.user.uid;
                const orgRef = db.ref('organisations').push();
                const orgId = orgRef.key;
                const now = Date.now();
                const orgData = {
                    id: orgId,
                    name: this.orgForm.name.trim(),
                    location: this.orgForm.location.trim(),
                    adminUid: uid,
                    adminEmail: this.orgForm.email.trim(),
                    active: true,
                    createdAt: now
                };

                const adminData = {
                    uid,
                    email: this.orgForm.email.trim(),
                    nom: this.orgForm.name.trim(),
                    role: 'المسؤول',
                    orgId,
                    orgName: this.orgForm.name.trim(),
                    active: true,
                    lastSeen: 0,
                    createdAt: now
                };

                await Promise.all([
                    orgRef.set(orgData),
                    db.ref('utilisateurs/' + uid).set(adminData)
                ]);

                await secondaryAuth.signOut();
                await secondaryApp.delete();
                this.closeModal();
                this.showToast('تم إنشاء المنظمة وحساب المنظم بنجاح');
                
            } catch (error) {
                this.showToast(error.message, 'error');
            } finally {
                this.loading = false;
            }
        },

        async updateOrganisation() {
            if (!this.selectedOrgId || !this.orgForm.name.trim() || !this.orgForm.email.trim()) {
                this.showToast('يرجى إدخال اسم المنظمة والبريد الإلكتروني', 'error');
                return;
            }

            if (this.orgForm.password && this.orgForm.password.length < 6) {
                this.showToast('كلمة المرور يجب أن تتكون من 6 أحرف على الأقل', 'error');
                return;
            }

            try {
                this.loading = true;
                const org = this.organisations.find(item => item.id === this.selectedOrgId) || {};
                const now = Date.now();
                const name = this.orgForm.name.trim();
                const location = this.orgForm.location.trim();
                const email = this.orgForm.email.trim();
                const emailChanged = email !== (org.adminEmail || '');
                const shouldReplaceAdminAccount = emailChanged || !!this.orgForm.password;
                let adminUid = org.adminUid || null;
                let adminEmail = org.adminEmail || email;

                if (shouldReplaceAdminAccount) {
                    if (!this.orgForm.password) {
                        this.showToast('يرجى إدخال كلمة مرور جديدة عند تغيير البريد الإلكتروني', 'error');
                        return;
                    }

                    if (!emailChanged && org.adminEmail) {
                        this.showToast('لتغيير كلمة المرور من هذه الشاشة، يرجى إدخال بريد إلكتروني جديد أيضًا', 'error');
                        return;
                    }

                    const replacement = await this.createOrganiserAccount({
                        email,
                        password: this.orgForm.password,
                        name,
                        orgId: this.selectedOrgId,
                        active: org.active !== false,
                        createdAt: now
                    });
                    const oldAdminUid = adminUid;
                    adminUid = replacement.uid;
                    adminEmail = email;
                    if (oldAdminUid && oldAdminUid !== adminUid) {
                        await db.ref('utilisateurs/' + oldAdminUid).remove();
                    }
                }

                const updates = {
                    name,
                    location,
                    adminEmail,
                    updatedAt: now
                };

                if (adminUid) {updates.adminUid = adminUid;}
                const promises = [
                    db.ref('organisations/' + this.selectedOrgId).update(updates),
                    db.ref(`orgData/${this.selectedOrgId}/metadata`).remove()
                ];

                if (adminUid && !shouldReplaceAdminAccount) {
                    promises.push(db.ref('utilisateurs/' + adminUid).update({
                        email: adminEmail,
                        nom: name,
                        orgName: name,
                        updatedAt: now
                    }));
                }

                await Promise.all(promises);
                this.closeModal();
                this.showToast('تم تعديل المنظمة بنجاح');

            } catch (error) {
                this.showToast(error.message, 'error');
            } finally {
                this.loading = false;
            }
        },

        async createOrganiserAccount({email, password, name, orgId, active, createdAt}) {
            const secondaryApp = firebase.apps.find(app => app.name === 'Secondary') || firebase.initializeApp(firebaseConfig, 'Secondary');
            const secondaryAuth = secondaryApp.auth();
            const credential = await secondaryAuth.createUserWithEmailAndPassword(email, password);
            const uid = credential.user.uid;

            await db.ref('utilisateurs/' + uid).set({
                uid,
                email,
                nom: name,
                role: 'المسؤول',
                orgId,
                orgName: name,
                active,
                lastSeen: 0,
                createdAt
            });

            await secondaryAuth.signOut();
            await secondaryApp.delete();
            return {uid};
        },

        async toggleOrganisation(org) {
            try {
                this.loading = true;
                const active = org.active === false;
                const adminUid = org.adminUid || null;
                const updates = {active, updatedAt: Date.now()};
                const promises = [
                    db.ref('organisations/' + org.id).update(updates),
                    db.ref(`orgData/${org.id}/metadata`).remove()
                ];

                if (adminUid) {promises.push(db.ref('utilisateurs/' + adminUid).update({active, updatedAt: Date.now()}));}
                await Promise.all(promises);
                this.showToast(active ? 'تم تفعيل المنظمة' : 'تم تعطيل المنظمة');

            } catch (error) {
                this.showToast(error.message, 'error');
            } finally {
                this.loading = false;
            }
        },

        askDeleteOrganisation(org) {
            this.confirmDelete = {
                visible: true,
                org,
                confirm: async () => {
                    this.confirmDelete.visible = false;
                    await this.deleteOrganisation(org);
                }
            };
        },

        async deleteOrganisation(org) {
            try {
                this.loading = true;
                const adminUid = org.adminUid || null;
                const promises = [
                    db.ref('organisations/' + org.id).remove(),
                    db.ref('orgData/' + org.id).remove()
                ];

                if (adminUid) {
                    promises.push(db.ref('utilisateurs/' + adminUid).remove());
                }

                await Promise.all(promises);
                this.showToast('تم حذف المنظمة بنجاح');
            } catch (error) {
                this.showToast(error.message, 'error');
            } finally {
                this.loading = false;
            }
        },

        showToast(message, type = 'success') {
            this.toast = {show: true, message, type};
            setTimeout(() => {
                this.toast.show = false;
            }, 4000);
        },

        formatDate(value) {
            if (!value) return '-';
            return new Date(value).toLocaleString('ar');
        }
    };
}

document.getElementById("togglePassword").addEventListener("click", () => {
    const passwordInput = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.5C7.305 4.5 3.195 7.605 1.89 12c1.305 4.395 5.415 7.5 10.11 7.5s8.805-3.105 10.11-7.5C20.805 7.605 16.695 4.5 12 4.5z M12 15a3 3 0 110-6 3 3 0 010 6zM3 3l18 18"/>`;
    } else {
        passwordInput.type = "password";
        eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.5C7.305 4.5 3.195 7.605 1.89 12c1.305 4.395 5.415 7.5 10.11 7.5s8.805-3.105 10.11-7.5C20.805 7.605 16.695 4.5 12 4.5z M12 15a3 3 0 110-6 3 3 0 010 6z"/>`;
    }
});
</script>
</body>
</html>
