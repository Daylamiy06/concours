<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module">
  window.fetchNumeros = function(callback) {
    try {
      onValue(ref(db, 'numeros'), snapshot => {
        const data = snapshot.val() || {};
        callback(Object.values(data), {
          ajouterNumero: numero => set(ref(db, 'numeros/numero' + numero.id), numero),
          supprimerNumero: id => remove(ref(db, 'numeros/numero' + id))
        });
      }, error => {
        alert('خطأ في تحميل البيانات: ' + error.message);
      });
    } catch (e) {
      alert('فشل في الاتصال بـ Firebase');
    }
  };
</script>
<title>إدارة أرقام الأسئلة</title>
<style>
        input:focus, select:focus {
            border-color: #3b82f6 !important;
            outline: none;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="bg-white p-6 shadow-md rounded-lg max-w-[1000px] mx-auto"
  x-data="{
    numeros: [],
	ajzaFilter: '',
	actions: null,
	loading: true,
    showModal: false,
    snackbarMessage: '',
    snackbarVisible: false,
    numeroSelectionne: null,
    confirmDelete: {
      visible: false,
      id: null,
      confirm: () => {}
    },
    showSnackbar(message) {
      this.snackbarMessage = message;
      this.snackbarVisible = true;
      setTimeout(() => this.snackbarVisible = false, 3000);
    },
    deleteNumero(id) {
      this.confirmDelete.visible = true;
      this.confirmDelete.id = id;
      this.confirmDelete.confirm = () => {
        this.actions.supprimerNumero(id)
          .then(() => {
            this.showSnackbar('تم حذف الرقم');
            this.confirmDelete.visible = false;
          })
          .catch(error => this.showSnackbar('حدث خطأ: ' + error.message));
      };
    }
  }"
  @snackbar.window="showSnackbar($event.detail)"
  x-init="fetchNumeros(data => {
    numeros = data;
    loading = false;
  }).then(result => actions = result)">
  
  <!-- Loading Spinner -->
  <div x-show="loading" class="fixed inset-0 bg-white bg-opacity-90 flex items-center justify-center z-50" x-cloak>
    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500"></div>
  </div>

	<h1 class="text-2xl font-bold mb-4 text-center">إدارة أرقام الأسئلة</h1>
	<div class="mb-4 flex items-center gap-4">
		<button @click="numeroSelectionne = ''; showModal = true" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">رقم جديد</button>
		<div class="flex items-center gap-2">
			<label class="block text-lg font-bold whitespace-nowrap">تصفية حسب الجزء :</label>
			<select x-model="ajzaFilter" class="border-2 border-gray-500 p-2 rounded">
    			<option value="">الكل</option>
    			<template x-for="j in [...new Set(numeros.map(n => n.ajza))].sort((a, b) => a - b)" :key="j">
    				<option :value="j" x-text="j"></option>
    			</template>
			</select>
		</div>
	</div>

	<!-- Cards -->
	<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
		<template x-for="numero in numeros" :key="numero.id">
          <div x-show="!ajzaFilter || numero.ajza == ajzaFilter" class="bg-blue-100 border-2 border-gray-500 rounded shadow-md p-4 transform transition cursor-pointer relative">
            <div class="absolute top-1 right-3" x-data="{ openMenu: false }">
              <button @click.stop="openMenu = !openMenu" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">⋮</button>
              <div x-show="openMenu" @click.away="openMenu = false" class="absolute right-0 mt-1 w-24 bg-white border border-gray-300 rounded shadow-md z-10">
                <button @click.stop="numeroSelectionne = numero; showModal = true; openMenu = false" class="block w-full text-right px-4 py-2 text-gray-700 hover:bg-gray-100">تعديل</button>
                <button @click.stop="deleteNumero(numero.id); openMenu = false" class="block w-full text-right px-4 py-2 text-red-600 hover:bg-gray-100">حذف</button>
              </div>
            </div>
            <h2 class="text-3xl font-bold text-center text-black mb-4" x-text="numero.numero"></h2>
            <h2 class="text-center text-black" x-show="!ajzaFilter" x-text="'جزء : ' + numero.ajza"></h2>
          </div>
        </template>
		<div x-show="!numeros.length" class="text-gray-500 col-span-full text-center py-8">لا توجد أرقام مسجلة حالياً.</div>
	</div>

<!-- Modale -->
<div x-show="showModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50" @click="showModal = false" x-cloak>
  <div @click.stop x-ref="modalContent" class="bg-white p-6 rounded shadow w-11/12 sm:w-4/5 md:w-2/3 max-h-[80vh] flex flex-col"
  x-data="{
    sourates: [],
    pages: [],
    ajza: [],
    ajzaSel: '',
    errorMessage: '',
    questions: [
      {label:'السؤال الأول', sourateFromId:'', versetFrom:'', pageFrom:'', maxVersetsFrom:0, sourateToId:'', versetTo:'', pageTo:'', maxVersetsTo:0},
      {label:'السؤال الثاني', sourateFromId:'', versetFrom:'', pageFrom:'', maxVersetsFrom:0, sourateToId:'', versetTo:'', pageTo:'', maxVersetsTo:0},
      {label:'السؤال الثالث', sourateFromId:'', versetFrom:'', pageFrom:'', maxVersetsFrom:0, sourateToId:'', versetTo:'', pageTo:'', maxVersetsTo:0}
    ],
    resetForm() {
      this.ajzaSel = '';
      this.errorMessage = '';
      this.questions.forEach(q => {
        q.sourateFromId = '';
        q.versetFrom = '';
        q.pageFrom = '';
        q.maxVersetsFrom = 0;
        q.sourateToId = '';
        q.versetTo = '';
        q.pageTo = '';
        q.maxVersetsTo = 0;
      });
    },
    async init() {
      const {db} = await window.initFirebase();
      const {ref, get} = await import('https://www.gstatic.com/firebasejs/11.5.0/firebase-database.js');

      // Charger sourates
      const snap = await get(ref(db, 'sourates'));
      this.sourates = Object.entries(snap.val() || {}).map(([id, v]) => ({
        id,
        nom: v.sourate,
        versets: v.verset
      }));

      // Charger pages
      const snap3 = await get(ref(db, 'pages'));
      this.pages = Object.values(snap3.val() || {}).map(p => ({
        sourateId: String(p.sourateId),
        verset_debut: Number(p.verset_debut),
        verset_fin: Number(p.verset_fin),
        page: Number(p.page)
      }));

      // Liste fixe des ajza (1..30)
      this.ajza = Array.from({ length: 30 }, (_, i) => i + 1);
    },
    majVersets(q, side) {
      const sourateKey = side === 'from' ? 'sourateFromId' : 'sourateToId';
      const maxKey = side === 'from' ? 'maxVersetsFrom' : 'maxVersetsTo';
      const versetKey = side === 'from' ? 'versetFrom' : 'versetTo';
      const pageKey = side === 'from' ? 'pageFrom' : 'pageTo';
      const s = this.sourates.find(x => String(x.id) === String(q[sourateKey]));
      q[maxKey] = s ? Number(s.versets) : 0;
      q[versetKey] = '';
      q[pageKey] = '';
    },
    majPage(q, side) {
      const sourateKey = side === 'from' ? 'sourateFromId' : 'sourateToId';
      const versetKey = side === 'from' ? 'versetFrom' : 'versetTo';
      const pageKey = side === 'from' ? 'pageFrom' : 'pageTo';
      if (!q[sourateKey] || !q[versetKey]) { q[pageKey] = ''; return; }
      const sId = String(q[sourateKey]);
      const versetNum = Number(q[versetKey]);
      const match = this.pages.find(p =>
        String(p.sourateId) === sId &&
        versetNum >= Number(p.verset_debut) &&
        versetNum <= Number(p.verset_fin)
      );
      q[pageKey] = match ? match.page : '';
    },
    syncToSourateWithFrom(q) {
      q.sourateToId = q.sourateFromId;
      this.majVersets(q, 'to');
    },
    syncToVersetWithFrom(q) {
      q.versetTo = q.versetFrom;
      this.majPage(q, 'to');
    },
    async confirmer() {
      if (!this.ajzaSel) {
        this.errorMessage = 'يرجى اختيار الجزء.';
        return;
      }

      if (this.questions.some(q => !q.sourateFromId || !q.versetFrom || !q.sourateToId || !q.versetTo)) {
        this.errorMessage = 'يرجى ملء جميع الحقول.';
        return;
      }

      const dataToSave = {ajza: +this.ajzaSel};

      this.questions.forEach((q, i) => {
        const idx = i + 1;
        const sourateFrom = Number(q.sourateFromId);
        const sourateTo = Number(q.sourateToId);
        const versetFrom = Number(q.versetFrom);
        const versetTo = Number(q.versetTo);

        dataToSave[`sourateFromQ${idx}`] = sourateFrom;
        dataToSave[`versetFromQ${idx}`] = versetFrom;
        dataToSave[`pageFromQ${idx}`] = Number(q.pageFrom || 0);

        dataToSave[`sourateToQ${idx}`] = sourateTo;
        dataToSave[`versetToQ${idx}`] = versetTo;
        dataToSave[`pageToQ${idx}`] = Number(q.pageTo || 0);
      });

      try {
        const {db} = await window.initFirebase();
        const {ref, get, set, update, child} = await import('https://www.gstatic.com/firebasejs/11.5.0/firebase-database.js');
        const numerosRef = ref(db, 'numeros');
        const snapshot = await get(numerosRef);
        const allNumeros = snapshot.val() || {};
        const existantKeys = new Set();
        const localKeys = new Set();

        for (let i = 1; i <= 3; i++) {
          for (const part of ['From', 'To']) {
            const s = dataToSave[`sourate${part}Q${i}`];
            const v = +dataToSave[`verset${part}Q${i}`];

            if (s && v) {
              const key = `${s}:${v}`;
              if (localKeys.has(key)) {
                this.errorMessage = `لا يمكن اختيار نفس الآية أكثر من مرة (سورة ${s}، آية ${v}).`;
                return;
              }
              localKeys.add(key);
            }
          }
        }

        for (const id in allNumeros) {
          if (numeroSelectionne && id === String(numeroSelectionne.id)) continue;
          const enreg = allNumeros[id];
          for (let i = 1; i <= 3; i++) {
            const fromS = enreg[`sourateFromQ${i}`];
            const fromV = +enreg[`versetFromQ${i}`];
            const toS = enreg[`sourateToQ${i}`];
            const toV = +enreg[`versetToQ${i}`];
            if (fromS && fromV) existantKeys.add(`${fromS}:${fromV}`);
            if (toS && toV) existantKeys.add(`${toS}:${toV}`);
          }
        }

        for (let i = 1; i <= 3; i++) {
          for (const part of ['From', 'To']) {
            const s = dataToSave[`sourate${part}Q${i}`];
            const v = +dataToSave[`verset${part}Q${i}`];
            if (s && v && existantKeys.has(`${s}:${v}`)) {
              this.errorMessage = `الآية ${v} من سورة ${s} موجودة بالفعل.`;
              return;
            }
          }
        }

        function plages() {
  		const p = [];
  		for (let i = 1; i <= 90; i += 10) {
    		p.push([i, i + 9]);
  		}
  		for (let i = 100; i <= 900; i += 100) {
    		p.push([i, i + 99]);
  		}
  		return p;
		}

		const utilises = new Set(
  		Object.values(allNumeros)
    		.filter(n => n.ajza === dataToSave.ajza)
    		.map(n => n.numero)
		);

		let numero = null;

		for (const [min, max] of plages()) {
  		const libres = [];
  		for (let n = min; n <= max; n++) {
    		if (!utilises.has(n)) libres.push(n);
  		}

  		if (libres.length) {
    		numero = libres[Math.floor(Math.random() * libres.length)];
    		break;
  		}
		}

		if (numero === null) {
  		this.errorMessage = 'Tous les numéros sont déjà utilisés pour ce juz’.';
  		return;
		}

		dataToSave.numero = numero;

        if (this.numeroSelectionne) {
          await update(child(numerosRef, this.numeroSelectionne.id), dataToSave);
          showModal = false;
          this.$dispatch('snackbar', `تم التحديث بنجاح`);
        } else {
          const keys = Object.keys(allNumeros).map(k => +k).filter(n => !isNaN(n));
          const newId = keys.length ? Math.max(...keys) + 1 : 1;
          await set(child(numerosRef, String(newId)), dataToSave);
          showModal = false;
          this.$dispatch('snackbar', `تم التسجيل بنجاح`);
        }
      } catch (e) {
        this.errorMessage = 'خطأ أثناء عملية التسجيل: ' + e.message;
      }
    }
  }"
  x-init="init()"
  x-effect="
  if (showModal) {
    if (numeroSelectionne) {
      errorMessage = '';
      ajzaSel = numeroSelectionne.ajza;
      questions.forEach((q, i) => {
        const idx = i + 1;
        const fromS = numeroSelectionne[`sourateFromQ${idx}`];
        const fromV = numeroSelectionne[`versetFromQ${idx}`];
        const toS = numeroSelectionne[`sourateToQ${idx}`];
        const toV = numeroSelectionne[`versetToQ${idx}`];

        q.sourateFromId = fromS ? String(fromS) : '';
        q.sourateToId = toS ? String(toS) : '';

        const fromObj = sourates.find(s => String(s.id) === String(q.sourateFromId));
        const toObj = sourates.find(s => String(s.id) === String(q.sourateToId));

        q.maxVersetsFrom = fromObj?.versets || 0;
        q.maxVersetsTo = toObj?.versets || 0;

        Alpine.nextTick(() => {
          q.versetFrom = fromV || '';
          q.versetTo = toV || '';
          majPage(q, 'from');
          majPage(q, 'to');
        });
      });
    } else {
      resetForm();
    }
  }">
  <div class="shadow-md w-full z-50 pl-4 pr-6">
	<h2 class="text-2xl font-semibold text-center mb-4">إضافة رقم جديد</h2>
    <template x-if="errorMessage">
      <div class="mb-4 text-red-600 bg-red-100 border border-red-300 rounded px-4 py-2 text-sm text-right shadow-md">
        <span x-text="errorMessage"></span>
      </div>
    </template>
    <div class="mb-4">
      <label class="block mb-1 font-semibold text-gray-700">الجزء</label>
      <select x-model="ajzaSel" :class="{'border-red-500': !ajzaSel && errorMessage}" class="w-full border-2 border-gray-500 p-2 rounded">
        <option value="">-- اختر جزء --</option>
        <template x-for="j in ajza" :key="j">
          <option :value="j" x-text="j"></option>
        </template>
      </select>
    </div>
  </div>
    
    <div class="flex-1 overflow-y-auto pr-2 space-y-6">
      <template x-for="(q, i) in questions" :key="i">
        <div class="border border-gray-300 p-4 rounded bg-gray-50">
          <h2 class="text-lg font-bold text-blue-600 mb-4" x-text="q.label"></h2>
          <div class="grid grid-cols-2 gap-2 items-end mb-3">
            <div class="col-span-2 text-sm font-bold text-gray-700">من</div>
            <div class="min-w-0">
              <label class="block mb-1">السورة</label>
              <select x-model="q.sourateFromId" @change="majVersets(q, 'from'); syncToSourateWithFrom(q)" :class="{'border-red-500': !q.sourateFromId && errorMessage}" class="w-full border-2 border-gray-500 p-2 rounded">
                <option value="">-- اختر سورة --</option>
                <template x-for="s in sourates" :key="'from-'+s.id">
                  <option :value="s.id" x-text="s.nom"></option>
                </template>
              </select>
            </div>
            <div class="min-w-0">
              <label class="block mb-1">الآية</label>
              <select x-model="q.versetFrom" @change="majPage(q, 'from'); syncToVersetWithFrom(q)" :class="{'border-red-500': !q.versetFrom && errorMessage}" class="w-full border-2 border-gray-500 p-2 rounded">
                <option value="">-- اختر آية --</option>
                <template x-if="q.maxVersetsFrom > 0">
                  <template x-for="n in q.maxVersetsFrom" :key="'from-v-'+n">
                    <option :value="n" x-text="n"></option>
                  </template>
                </template>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-2 items-end">
            <div class="col-span-2 text-sm font-bold text-gray-700">إلى</div>
            <div class="min-w-0">
              <label class="block mb-1">السورة</label>
              <select x-model="q.sourateToId" @change="majVersets(q, 'to')" :class="{'border-red-500': !q.sourateToId && errorMessage}" class="w-full border-2 border-gray-500 p-2 rounded">
                <option value="">-- اختر سورة --</option>
                <template x-for="s in sourates" :key="'to-'+s.id">
                  <option :value="s.id" x-text="s.nom"></option>
                </template>
              </select>
            </div>
            <div class="min-w-0">
              <label class="block mb-1">الآية</label>
              <select x-model="q.versetTo" @change="majPage(q, 'to')" :class="{'border-red-500': !q.versetTo && errorMessage}" class="w-full border-2 border-gray-500 p-2 rounded">
                <option value="">-- اختر آية --</option>
                <template x-if="q.maxVersetsTo > 0">
                  <template x-for="n in q.maxVersetsTo" :key="'to-v-'+n">
                    <option :value="n" x-text="n"></option>
                  </template>
                </template>
              </select>
            </div>
          </div>
        </div>
      </template>
    </div>
    <div class="flex justify-between gap-4 mt-4">
      <button @click="confirmer" class="flex-1 bg-blue-600 text-white py-2 rounded hover:bg-blue-700">تأكيد</button>
      <button @click="showModal = false;" class="flex-1 bg-gray-400 text-white py-2 rounded">إلغاء</button>
    </div>
  </div>
</div>

  <!-- Boîte de confirmation personnalisée -->
  <div x-show="confirmDelete.visible" class="fixed inset-0 bg-black bg-opacity-50 shadow-2xl flex items-center justify-center z-50" x-cloak>
    <div class="bg-white p-6 rounded shadow-md text-center w-80">
      <h2 class="text-xl font-bold mb-4">تأكيد الحذف</h2>
      <p class="mb-6">هل أنت متأكد من حذف هذا الرقم؟</p>
      <div class="flex justify-center gap-4">
        <button @click="confirmDelete.confirm()" class="bg-blue-500 text-white px-5 font-bold py-1 rounded">نعم</button>
        <button @click="confirmDelete.visible = false" class="bg-red-500 text-white px-5 font-bold py-1 rounded">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- Snackbar -->
  <div x-show="snackbarVisible" class="fixed top-1/3 left-1/2 transform -translate-x-1/2 bg-blue-100 border-2 border-gray-500 text-black rounded px-4 py-2 shadow-md" x-cloak>
    <span x-text="snackbarMessage"></span>
  </div>
</div>
</body>
</html>
